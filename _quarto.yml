project:
  type: website
  # NOTE: fetch.py is invoked as a separate workflow step before `quarto render`
  # (see .github/workflows/build.yml). It rewrites index.qmd with an inline
  # listing.contents list, bypassing Quarto's filesystem-glob resolver which
  # only sees files present at project init time.
  # For local development, run:
  #   python _extensions/coatless/quarto-org-index/fetch.py && quarto render

website:
  title: "Coatless Rust"
  site-url: "https://rust.thecoatlessprofessor.com/"
  description: "Rust crates and experiments."
  page-footer:
    center: "© 2026 HJJB, LLC. All rights reserved."
    right:
      - icon: github
        href: https://github.com/coatless
        aria-label: GitHub
      - icon: mastodon
        href: https://mastodon.social/@coatless
        aria-label: Mastodon
      - icon: linkedin
        href: https://www.linkedin.com/in/jamesbalamuta/
        aria-label: LinkedIn
      - icon: youtube
        href: https://www.youtube.com/@thecoatlessprofessor7674
        aria-label: YouTube
  navbar:
    right:
      - href: https://blog.thecoatlessprofessor.com/
        text: Blog
      - href: https://thecoatlessprofessor.com/projects/
        text: Projects
      - href: https://thecoatlessprofessor.com/research/
        text: Research
      - href: https://thecoatlessprofessor.com/contact/
        text: Contact

format:
  html:
    theme: cosmo
    css: _extensions/coatless/quarto-org-index/assets/org-index.css

org-index:
  include-archived: false
  include-forks: false
  pin: []
  hide: []
